name: Build and Push to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fonteyn-backend:${{ github.sha }} ./fonteyn-website-New-Improved/backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fonteyn-backend:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fonteyn-frontend:${{ github.sha }} ./fonteyn-website-New-Improved/frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fonteyn-frontend:${{ github.sha }}